<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinlandVibe App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
:root{
--bg:#0a0a0a;
--card:#111;
--accent:#ff2e63;
--text:#eee;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:var(--bg);color:var(--text);}

header{
position:fixed;top:0;left:0;right:0;
display:flex;justify-content:space-between;
padding:14px;background:#0a0a0af0;
z-index:100;border-bottom:1px solid #222;
}
.logo{
font-weight:900;font-size:22px;
background:linear-gradient(90deg,#ff2e63,#f9d423);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.feed{
margin-top:70px;
max-width:500px;
margin-inline:auto;
padding-bottom:80px;
}

.post{
background:var(--card);
margin:15px;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
}

.post img{
width:100%;
display:block;
object-fit:cover;
}

.post-header{
display:flex;
gap:10px;
padding:10px;
align-items:center;
}

.actions{
display:flex;
gap:18px;
padding:10px;
font-size:22px;
}

.actions i{
cursor:pointer;
transition:.2s;
}

.liked{
color:var(--accent);
transform:scale(1.2);
}

.caption{
padding:0 12px 8px;
font-size:14px;
}

.comments{
padding:0 12px 10px;
font-size:13px;
color:#bbb;
}

input{
width:100%;
padding:8px;
border:none;
background:#222;
color:white;
border-radius:8px;
margin-top:6px;
}
</style>
</head>

<body>

<header>
<div class="logo">VINLAND</div>
</header>

<div class="feed" id="feed"></div>

<script>

// 🔥 PUT YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ✅ YOUR IMAGES (HIGH QUALITY)
const images = [
"https://i.ibb.co/Y7pLhtFB/1.jpg",
"https://i.ibb.co/TxDH8D9n/2.jpg",
"https://i.ibb.co/rGYsrv0L/3.jpg",
"https://i.ibb.co/KzcQXyLK/4.jpg",
"https://i.ibb.co/Cs50jMVx/5.jpg",
"https://i.ibb.co/Qv6n5TZL/6.jpg",
"https://i.ibb.co/ZDPSXYm/7.jpg",
"https://i.ibb.co/PvN3Zch4/8.jpg"
];

const feed = document.getElementById("feed");

images.forEach((src,index)=>{

const post = document.createElement("div");
post.className = "post";

post.innerHTML = `
<div class="post-header">
<strong>Kartikey</strong>
</div>

<img src="${src}">

<div class="actions">
<i class="fas fa-heart" id="like-${index}"></i>
<i class="fas fa-comment"></i>
</div>

<div class="caption">Vinland energy 🔥</div>

<div class="comments" id="comments-${index}"></div>

<input placeholder="Add comment..." id="input-${index}">
`;

feed.appendChild(post);

// ❤️ LIKE SYSTEM (stored)
const likeBtn = document.getElementById(`like-${index}`);
likeBtn.onclick = ()=>{
likeBtn.classList.toggle("liked");

db.collection("likes").add({
post:index,
time:Date.now()
});
};

// 💬 COMMENT SYSTEM (stored + live)
const input = document.getElementById(`input-${index}`);

input.addEventListener("keypress", e=>{
if(e.key==="Enter" && input.value.trim()!==""){

db.collection("comments").add({
post:index,
text:input.value,
time:Date.now()
});

input.value="";
}
});

// 🔄 LIVE COMMENTS LOAD
db.collection("comments")
.onSnapshot(snapshot=>{

const box = document.getElementById(`comments-${index}`);
box.innerHTML="";

snapshot.forEach(doc=>{
const data = doc.data();

if(data.post===index){
const div = document.createElement("div");
div.textContent = "User: " + data.text;
box.appendChild(div);
}
});

});

});

</script>

</body>
</html>
