<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinland Feed</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:-apple-system,system-ui;
}

header{
padding:12px;
border-bottom:1px solid #222;
font-weight:700;
font-size:18px;
}

.feed{
max-width:500px;
margin:auto;
}

.post{
border-bottom:1px solid #222;
margin-bottom:15px;
}

.post img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
}

.actions{
display:flex;
gap:15px;
padding:10px;
font-size:22px;
}

.liked{
color:#ff2e63;
}

.caption{
padding:0 12px 10px;
}

.comments{
padding:0 12px 10px;
font-size:13px;
color:#bbb;
}

input{
width:100%;
padding:10px;
background:#000;
border:none;
color:#fff;
border-top:1px solid #222;
}
</style>
</head>

<body>

<header>Vinland</header>

<div class="feed" id="feed"></div>

<script>

// HD images (clear)
const images = [
"https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d",
"https://images.unsplash.com/photo-1492724441997-5dc865305da7",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1519681393784-d120267933ba"
];

const feed = document.getElementById("feed");

images.forEach(src => {

const post = document.createElement("div");
post.className = "post";

post.innerHTML = `
<img src="${src}">

<div class="actions">
<i class="fas fa-heart"></i>
<i class="fas fa-comment"></i>
</div>

<div class="caption"><b>Kartikey</b> Vinland vibe 🔥</div>
<div class="comments"></div>

<input placeholder="Add comment...">
`;

feed.appendChild(post);

// ❤️ like
const likeBtn = post.querySelector(".fa-heart");
likeBtn.onclick = () => {
likeBtn.classList.toggle("liked");
};

// 💬 comment
const input = post.querySelector("input");
const box = post.querySelector(".comments");

input.addEventListener("keypress", e => {
if(e.key === "Enter" && input.value !== ""){
const div = document.createElement("div");
div.textContent = "You: " + input.value;
box.appendChild(div);
input.value = "";
}
});

});

</script>

</body>
</html>
