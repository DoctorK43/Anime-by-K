<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinlandVibe Stable</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script><style>
body{margin:0;background:#000;color:#fff;font-family:system-ui;}
header{padding:12px;border-bottom:1px solid #222;display:flex;justify-content:space-between;}
.feed{max-width:500px;margin:auto;margin-top:10px;}
.post img{width:100%;display:block;}
.post{border-bottom:1px solid #222;margin-bottom:10px;}
.actions{padding:10px;font-size:22px;display:flex;gap:15px;}
.liked{color:red;}
button{padding:10px;margin:10px;background:#ff2e63;color:#fff;border:none;border-radius:8px;}
</style></head><body><header>
<div>Vinland</div>
<button onclick="login()">Login</button>
</header><div class="feed" id="feed"></div><input type="file" id="file" hidden>
<button onclick="document.getElementById('file').click()">Upload</button><script>

// 🔥 REPLACE THIS
const firebaseConfig={
 apiKey:"AIzaSyBOA1aWIwVRmJOhP_TbppdjknjfRpML3sg",
 authDomain:"vinland-7629d.firebaseapp.com",
 projectId:"vinland-7629d",
 storageBucket:"vinland-7629d.appspot.com",
 messagingSenderId:"435734552310",
 appId:"1:435734552310:web:90f219f4c68d22afed96d7",
 measurementId:"G-BYENLVJYXS"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();
const storage=firebase.storage();

// LOGIN BUTTON FIX (no auto popup)
function login(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider).catch(()=>alert("Enable popups or use correct Firebase config"));
}

// UPLOAD
const fileInput=document.getElementById("file");
fileInput.onchange=async()=>{
if(!auth.currentUser) return alert("Login first");

const file=fileInput.files[0];
const ref=storage.ref("posts/"+Date.now());
await ref.put(file);
const url=await ref.getDownloadURL();

await db.collection("posts").add({
image:url,
user:auth.currentUser.displayName,
likes:0,
time:Date.now()
});
};

const feed=document.getElementById("feed");

// LOAD POSTS (SAFE)
db.collection("posts").orderBy("time","desc").onSnapshot(snapshot=>{
feed.innerHTML="";

snapshot.forEach(doc=>{
const data=doc.data();

const post=document.createElement("div");
post.className="post";

post.innerHTML=`
<img src="${data.image}" onerror="this.src='https://via.placeholder.com/400'">
<div class="actions">
<i class="fas fa-heart"></i>
</div>
<div style="padding:10px">${data.likes} likes</div>
`;

const likeBtn=post.querySelector("i");
likeBtn.onclick=()=>{
likeBtn.classList.toggle("liked");
db.collection("posts").doc(doc.id).update({likes:data.likes+1});
};

feed.appendChild(post);
});

});

</script></body>
</html>
