<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VinlandVibe Ultra</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"><style>
:root{
--bg:#0a0a0a;
--card:#111;
--accent:#ff2e63;
--text:#eee;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui;background:var(--bg);color:var(--text);}

header{
position:fixed;top:0;left:0;right:0;
display:flex;justify-content:space-between;
padding:14px;background:#0a0a0af0;z-index:100;
backdrop-filter:blur(10px);
}
.logo{font-weight:900;font-size:24px;background:linear-gradient(90deg,#ff2e63,#f9d423);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.feed{margin-top:70px;padding-bottom:90px;max-width:500px;margin-inline:auto;}
.post{background:var(--card);margin:15px;border-radius:16px;overflow:hidden;position:relative;}
.post img{width:100%;display:block;cursor:pointer;}

.post-header{display:flex;gap:10px;padding:10px;align-items:center;}
.post-header img{width:38px;height:38px;border-radius:50%;}

.actions{display:flex;gap:18px;padding:10px;font-size:22px;}
.actions i{cursor:pointer;transition:.2s;}
.actions i.liked{color:var(--accent);transform:scale(1.2);}

.caption{padding:0 12px 12px;font-size:14px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;
display:flex;justify-content:space-around;
padding:10px;background:#0a0a0af5;}

/* DOUBLE TAP HEART */
.heart{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(0);
font-size:80px;color:white;
pointer-events:none;
}
.heart.show{
animation:pop 0.6s ease;
}
@keyframes pop{
0%{transform:translate(-50%,-50%) scale(0);opacity:1}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(0);opacity:0}
}

/* MODAL VIEW */
.modal{
position:fixed;inset:0;background:black;
display:none;justify-content:center;align-items:center;z-index:200;
}
.modal img{max-width:100%;max-height:100%;}
.modal.active{display:flex;}

/* DOWNLOAD BTN */
.download{
position:absolute;top:10px;right:10px;
background:#000a;padding:8px;border-radius:50%;cursor:pointer;
}
</style></head><body><header>
<div class="logo">VINLAND</div>
<i class="fas fa-bell"></i>
</header><div class="feed" id="feed"></div><div class="modal" id="modal">
<img id="modalImg">
</div><div class="bottom-nav">
<i class="fas fa-home"></i>
<i class="fas fa-compass"></i>
<i class="fas fa-plus-circle" style="color:var(--accent);"></i>
<i class="fas fa-heart"></i>
<i class="fas fa-user"></i>
</div><script>
const images=[
"https://i.ibb.co/Y7pLhtFB",
"https://i.ibb.co/TxDH8D9n",
"https://i.ibb.co/rGYsrv0L",
"https://i.ibb.co/KzcQXyLK",
"https://i.ibb.co/Cs50jMVx",
"https://i.ibb.co/Qv6n5TZL",
"https://i.ibb.co/ZDPSXYm",
"https://i.ibb.co/PvN3Zch4"
];

const feed=document.getElementById("feed");

images.forEach(src=>{
const post=document.createElement("div");
post.className="post";

post.innerHTML=`
<div class="post-header">
<img src="${src}">
<div><strong>Kartikey</strong><br><small>Now</small></div>
</div>

<img src="${src}" class="main-img">

<div class="download"><i class="fas fa-download"></i></div>

<div class="heart"><i class="fas fa-heart"></i></div>

<div class="actions">
<i class="fas fa-heart like-btn"></i>
<i class="fas fa-comment"></i>
<i class="fas fa-paper-plane"></i>
</div>

<div class="caption"><strong>Kartikey</strong> Vinland energy 🔥</div>
`;

// LIKE BUTTON
const likeBtn=post.querySelector(".like-btn");
likeBtn.onclick=()=>{
likeBtn.classList.toggle("liked");
};

// DOUBLE TAP
let lastTap=0;
const img=post.querySelector(".main-img");
const heart=post.querySelector(".heart");

img.onclick=()=>{
let now=Date.now();
if(now-lastTap<300){
heart.classList.add("show");
likeBtn.classList.add("liked");
setTimeout(()=>heart.classList.remove("show"),600);
}
lastTap=now;

// OPEN MODAL
openModal(src);
};

// DOWNLOAD
post.querySelector(".download").onclick=()=>{
const a=document.createElement("a");
a.href=src;
a.download="vinland.jpg";
a.click();
};

feed.appendChild(post);
});

// MODAL
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");

function openModal(src){
modal.classList.add("active");
modalImg.src=src;
}

modal.onclick=()=>modal.classList.remove("active");

</script></body>
</html>
